x-bitnet-api-env: &bitnet-api-env
    HOST: 0.0.0.0
    PORT: 8080
    THREADS: ${BITNET_THREADS}
    CTX_SIZE: ${BITNET_CTX_SIZE}
    N_PREDICT: ${BITNET_N_PREDICT}
    TEMPERATURE: ${BITNET_TEMPERATURE}
    MODELS_DIR: /models
    CURRENT_MODEL_FILE: /models/.current_model
    QUANT_TYPE: ${BITNET_QUANT_TYPE}
    HF_TOKEN: ${HF_TOKEN}

x-bitnet-api-common: &bitnet-api-common
    image: bitnet-runtime:local
    env_file:
      - .env
    expose:
      - "8080"
    restart: unless-stopped

services:

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:2.14.0
    container_name: nginx-proxy-manager
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    environment:
      TZ: ${TZ}
    volumes:
      - npm-data:/data
      - npm-letsencrypt:/etc/letsencrypt
    restart: unless-stopped

  ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: ddclient
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./config/ddclient:/config
    restart: unless-stopped

  # Build the BitNet runtime image once; model services below reuse it.
  bitnet-api:
    <<: *bitnet-api-common
    build:
      context: .
      dockerfile: docker/bitnet/Dockerfile
    container_name: bitnet-api
    environment:
      <<: *bitnet-api-env
      SERVICE_NAME: bitnet
    volumes:
      - ./models/bitnet:/models

  falcon-api:
    <<: *bitnet-api-common
    container_name: falcon-api
    environment:
      <<: *bitnet-api-env
      SERVICE_NAME: falcon
    volumes:
      - ./models/falcon:/models

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      - bitnet-api
      - falcon-api
    expose:
      - "8080"
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

volumes:
  npm-data:
  npm-letsencrypt:
  open-webui-data:
