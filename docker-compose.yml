x-bitnet-api-env: &bitnet-api-env
    HOST: 0.0.0.0
    PORT: 8080
    THREADS: ${BITNET_THREADS}
    CTX_SIZE: ${BITNET_CTX_SIZE}
    N_PREDICT: ${BITNET_N_PREDICT}
    TEMPERATURE: ${BITNET_TEMPERATURE}
    MODELS_DIR: /models
    CURRENT_MODEL_FILE: /models/.current_model
    QUANT_TYPE: ${BITNET_QUANT_TYPE}
    HF_TOKEN: ${HF_TOKEN}
    VIRTUAL_HOST: ${API_SUBDOMAIN}.${BASE_DOMAIN}
    VIRTUAL_DEST: /
    VIRTUAL_PORT: 8080
    LETSENCRYPT_HOST: ${API_SUBDOMAIN}.${BASE_DOMAIN}
    LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}

x-bitnet-api-common: &bitnet-api-common
    image: bitnet-runtime:local
    env_file:
      - .env
    expose:
      - "8080"
    restart: unless-stopped

services:

  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.8
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs
      - html:/usr/share/nginx/html
      - ./nginx/vhost.d:/etc/nginx/vhost.d:rw
      - /var/run/docker.sock:/tmp/docker.sock:ro
    restart: unless-stopped

  acme-companion:
    image: nginxproxy/acme-companion:2.6
    container_name: acme-companion
    depends_on:
      - nginx-proxy
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - certs:/etc/nginx/certs
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
      - ./nginx/vhost.d:/etc/nginx/vhost.d:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: ddclient
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ./config/ddclient:/config
    restart: unless-stopped

  # Build the BitNet runtime image once; model services below reuse it.
  bitnet-api:
    <<: *bitnet-api-common
    build:
      context: .
      dockerfile: docker/bitnet/Dockerfile
    container_name: bitnet-api
    environment:
      <<: *bitnet-api-env
      SERVICE_NAME: bitnet
      VIRTUAL_PATH: /bitnet
    volumes:
      - ./models/bitnet:/models

  falcon-api:
    <<: *bitnet-api-common
    container_name: falcon-api
    environment:
      <<: *bitnet-api-env
      SERVICE_NAME: falcon
      VIRTUAL_PATH: /falcon
    volumes:
      - ./models/falcon:/models

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      - bitnet-api
      - falcon-api
    environment:
      VIRTUAL_HOST: ${CHAT_SUBDOMAIN}.${BASE_DOMAIN}
      LETSENCRYPT_HOST: ${CHAT_SUBDOMAIN}.${BASE_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      VIRTUAL_PORT: 8080
    expose:
      - "8080"
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

volumes:
  certs:
  html:
  acme:
  open-webui-data:
